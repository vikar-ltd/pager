services:
  caddy:
    volumes:
      - ./proxy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
    ports:
      - "8080:80"

  # Standalone Next.js App Router site used to smoke-test the tracker snippet
  # in real client-side navigation. Boots on the host at http://localhost:3001.
  # Configure the site ID via the banner at the top of the demo page.
  demo:
    build:
      context: ./examples/next-demo
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks:
      - pager
